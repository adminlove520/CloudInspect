# CloudInspect Windows 后门检测规则
# 由 windows/scripts/sync_rules.py 自动生成

_meta:
  version: 1
  os: windows
  generated_by: sync_rules.py
  total_rules: 6

windows_rules:
  - id: "WIN_REG_RUN_001"
    name: "注册表 Run 键可疑项"
    check_type: "registry_key"
    path: "HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run"
    severity: "warning"
    description: "检查注册表 Run 键中的可疑自启动项"

  - id: "WIN_REG_RUN_USER"
    name: "用户级 Run 键可疑项"
    check_type: "registry_key"
    path: "HKCU:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run"
    severity: "warning"
    description: "检查用户级 Run 键"

  - id: "WIN_GUEST_ENABLED"
    name: "Guest 账户启用"
    check_type: "account"
    account: "Guest"
    severity: "warning"
    description: "Guest 账户被启用，可能用于后门"

  - id: "WIN_RDP_ENABLED"
    name: "RDP 远程桌面启用"
    check_type: "registry_key"
    path: "HKLM:\\SYSTEM\\CurrentControlSet\\Control\\Terminal Server"
    key: "fDeny"
    expected_value: "0"
    severity: "info"
    description: "远程桌面服务已启用"

  - id: "WIN_ADMIN_USERS"
    name: "本地管理员数量过多"
    check_type: "admin_count"
    threshold: 3
    severity: "warning"
    description: "本地管理员数量超过阈值"

  - id: "WIN_RK_DISABLED_DEFENDER"
    name: "Defender 被禁用"
    check_type: "registry_key"
    path: "HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows Defender"
    expected_value: "1"
    severity: "critical"
    description: "Windows Defender 被通过注册表禁用"