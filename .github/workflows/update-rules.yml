name: Update Detection Rules

on:
  schedule:
    - cron: '0 2 * * 6'
  workflow_dispatch:
    inputs:
      source:
        description: '规则源'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - custom
          - emerging
          - otx
          - abuseipdb
  repository_dispatch:
    types: [update-rules]

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      releases: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Run rule update script
        id: update
        env:
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}
        run: |
          echo "=== CloudInspect 规则更新 ==="
          python .github/scripts/update_rules.py --source "${{ inputs.source || 'all' }}"

      - name: Check for changes
        id: git_status
        run: |
          if git diff --quiet python/rules/; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "无规则更新，跳过 PR"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "=== 变更 ==="
            git diff --stat python/rules/
          fi

      - name: Create or update Pull Request
        if: steps.git_status.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(rules): auto-update detection rules"
          branch: feature/auto-update-rules
          delete-branch: false
          title: "🤖 自动规则更新"
          body: |
            ## CloudInspect 规则自动更新

            规则已从外部威胁情报源同步更新：
            - 后门检测规则 (backdoor_rules.yaml)
            - Rootkit 特征库 (rootkit_signatures.yaml)
            - Webshell 检测模式 (webshell_patterns.yaml)

            ### 规则来源

            | 来源 | 说明 |
            |---|---|
            | 自定义专家规则 | 基于 GScan + 安全经验 |
            | Emerging Threats | 恶意 IP (525+ 条) |
            | AlienVault OTX | 社区威胁情报脉冲 |
            | AbuseIPDB | 高置信度恶意 IP (200+ 条) |

            ### 自动审查通过，合并发布
          labels: |
            automated
            rules-update
            security

      - name: Auto-merge Pull Request
        if: steps.git_status.outputs.changes == 'true'
        run: |
          echo "等待 PR 创建完成..."
          sleep 10

          PR_NUMBER=$(gh pr list --repo ${{ github.repository }} --state open --label automated --json number --jq '.[0].number')
          echo "PR 编号: $PR_NUMBER"

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            echo "合并 PR #$PR_NUMBER"
            gh pr merge $PR_NUMBER --repo ${{ github.repository }} --squash --delete-branch
            echo "✅ PR 已合并"
          else
            echo "未找到 PR，跳过合并"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: steps.git_status.outputs.changes == 'true'
        id: create_release
        run: |
          PR_NUMBER=$(gh pr list --repo ${{ github.repository }} --state closed --label automated --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            TAG="rules-$(date +%Y%m%d)"
            echo "创建 Release tag: $TAG"

            gh release create $TAG \
              --repo ${{ github.repository }} \
              --title "Auto Update Rules $(date +%Y-%m-%d)" \
              --notes "## 规则自动更新

规则版本: $(date +%Y-%m-%d)

### 来源
- Emerging Threats: 恶意 IP 列表
- AlienVault OTX: 威胁情报脉冲
- AbuseIPDB: 高置信度 IP

### 文件
- backdoor_rules.yaml
- rootkit_signatures.yaml
- webshell_patterns.yaml

由 CloudInspect GitHub Actions 自动生成"

            echo "✅ Release $TAG 已创建"
          else
            echo "跳过 Release 创建（PR 可能未合并）"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          if [ "${{ steps.git_status.outputs.changes }}" == "true" ]; then
            TAG="rules-$(date +%Y%m%d)"
            echo "✅ 规则更新完成"
            echo "✅ PR 已合并到 main"
            echo "✅ Release $TAG 已发布: https://github.com/${{ github.repository }}/releases"
          else
            echo "✅ 规则已是最新，无更新"
          fi
