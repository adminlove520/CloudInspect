name: Update Detection Rules

on:
  schedule:
    - cron: '0 2 * * 6'
  workflow_dispatch:
    inputs:
      source:
        description: '规则源'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - custom
          - emerging
          - otx
          - abuseipdb
  repository_dispatch:
    types: [update-rules]

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Run rule update script
        id: update
        env:
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}
        run: |
          echo "=== CloudInspect 规则更新 ==="
          python .github/scripts/update_rules.py --source "${{ inputs.source || 'all' }}"

      - name: Check for changes
        id: git_status
        run: |
          if git diff --quiet python/rules/; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "无规则更新，跳过 PR"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "=== 变更 ==="
            git diff --stat python/rules/
          fi

      - name: Create Pull Request
        if: steps.git_status.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(rules): auto-update detection rules"
          branch: feature/auto-update-rules
          delete-branch: true
          title: "🤖 自动规则更新"
          body: |
            ## CloudInspect 规则自动更新

            规则已从外部威胁情报源同步更新：
            - 后门检测规则 (backdoor_rules.yaml)
            - Rootkit 特征库 (rootkit_signatures.yaml)
            - Webshell 检测模式 (webshell_patterns.yaml)

            规则来源: 自定义专家规则 + Emerging Threats + AlienVault OTX + AbuseIPDB

            ### 审查清单

            - [ ] 审查规则变更
            - [ ] 确认后合并
            - [ ] 可选发布 Release

            ---
            *由 CloudInspect GitHub Actions 自动生成*
          labels: |
            automated
            rules-update
            security

      - name: Result
        run: |
          if [ "${{ steps.git_status.outputs.changes }}" == "true" ]; then
            echo "✅ 规则已更新，PR 已创建: https://github.com/${{ github.repository }}/pulls"
          else
            echo "✅ 规则已是最新，无更新"
          fi
