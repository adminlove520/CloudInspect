name: Update Detection Rules

on:
  schedule:
    - cron: '0 2 * * 6'
  workflow_dispatch:
    inputs:
      source:
        description: '规则源'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - custom
          - emerging
          - otx
          - abuseipdb
  repository_dispatch:
    types: [update-rules]

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Run rule update script
        env:
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIpdb_API_KEY }}
        run: |
          python .github/scripts/update_rules.py --source "${{ inputs.source || 'all' }}"

      - name: Check for changes
        id: git_status
        run: |
          if git diff --quiet python/rules/; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "无规则更新，跳过后续步骤"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "变更:"
            git diff --stat python/rules/
          fi

      - name: Create Pull Request
        if: steps.git_status.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(rules): auto-update detection rules"
          branch: feature/auto-update-rules
          delete-branch: false
          title: "🤖 自动规则更新"
          body: |
            ## CloudInspect 规则自动更新

            规则已从外部威胁情报源同步更新。
          labels: |
            automated
            rules-update
            security

      - name: Auto-merge Pull Request
        if: steps.git_status.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 15
          PR_NUMBER=$(gh pr list \
            --repo ${{ github.repository }} \
            --state open \
            --label automated \
            --json number \
            --jq '.[0].number')
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            gh pr merge "$PR_NUMBER" \
              --repo ${{ github.repository }} \
              --squash \
              --delete-branch
            echo "PR #$PR_NUMBER 已合并"
          else
            echo "未找到 open PR，跳过合并"
          fi

      - name: Create Release
        if: steps.git_status.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="rules-$(date +%Y%m%d)"
          echo "创建 Release tag: $TAG"
          cat > /tmp/release-notes.md << 'NOTES'
          ## CloudInspect 规则自动更新

          来源: Emerging Threats + AlienVault OTX + AbuseIPDB + 专家规则
          文件: backdoor_rules.yaml / rootkit_signatures.yaml / webshell_patterns.yaml
          由 CloudInspect GitHub Actions 自动生成
          NOTES
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Auto Rules Update $(date +%Y-%m-%d)" \
            --notes-file /tmp/release-notes.md
          echo "Release $TAG 创建完成"

      - name: Summary
        run: |
          if [ "${{ steps.git_status.outputs.changes }}" == "true" ]; then
            echo "## ✅ 完成"
            echo "- 规则已更新"
            echo "- PR 已合并"
            echo "- Release 已发布"
            echo "📦 https://github.com/${{ github.repository }}/releases"
          else
            echo "✅ 规则已是最新"
          fi
