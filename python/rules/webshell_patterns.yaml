# coding: utf-8
"""
Webshell 检测规则库
"""

WEBSHELL_PATTERNS = [
    r"eval\s*\(",
    r"base64_decode\s*\(",
    r"system\s*\(",
    r"passthru\s*\(",
    r"exec\s*\(",
    r"shell_exec\s*\(",
    r"popen\s*\(",
    r"proc_open\s*\(",
    r"preg_replace\s*\(.*\/e",
    r"assert\s*\(",
    r"call_user_func\s*\(",
    r"create_function\s*\(",
    r"usort\s*\(",
    r"ini_set.*disable_functions",
    r"\\\\x[0-9a-f]{2}",
    r"chr\s*\(\d+\)\.chr",
    r"gxz\.php",
    r"404\.php",
    r"config\.php",
]

WEBSHELL_FILE_NAMES = [
    "404.php", "test.php", "info.php", "shell.php",
    "hack.php", "cmd.php", "webshell.php", "eval.php",
    "x.php", "a.php", "1.php", "2.php",
]

DANGER_EXTENSIONS = [".php", ".jsp", ".asp", ".aspx", ".py"]