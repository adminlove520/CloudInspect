# SSH 后门特征（自动更新）
ssh_backdoor_signatures:
  source: "custom_expert"
  patterns:
    - "ln -sf /usr/sbin/sshd /tmp/su"
    - "/tmp/su -oPort=5555"
    - "python.*-c.*spawn.*ssh"